services:
  - type: web
    name: interviewiq-api
    runtime: docker
    rootDir: server
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interviewiq-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: mock
      - key: CLIENT_ORIGIN
        value: https://your-vercel-domain.vercel.app

databases:
  - name: interviewiq-db
    plan: free
